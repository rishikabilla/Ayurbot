<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayurbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d0d;
            color: #4caf50;
            font-family: 'Arial', sans-serif;
        }
        .navbar {
            background: linear-gradient(90deg, #1e1e1e, #2c2c2c);
            border-bottom: 2px solid #4caf50;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.2);
        }
        .navbar .nav-link {
            color: #4caf50 !important;
            font-weight: bold;
            transition: color 0.3s;
        }
        .navbar .nav-link:hover {
            color: #81c784 !important;
        }
        .container {
            margin-top: 80px;
        }
        .card {
            background: rgba(30, 30, 30, 0.9);
            border: 2px solid #4caf50;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.2);
            border-radius: 15px;
            width: 100%;
            max-width: 600px;
        }
        .btn-custom {
            background: linear-gradient(90deg, #4caf50, #81c784);
            color: black;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-custom:hover {
            background: linear-gradient(90deg, #388e3c, #66bb6a);
            transform: scale(1.05);
        }
        .response-box {
            background: rgba(46, 46, 46, 0.9);
            border: 2px solid #4caf50;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.2);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-green" href="#">🌿 Ayurbot</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#resources">Resources</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container d-flex flex-column align-items-center justify-content-center">
        <h1 class="mb-4 fw-bold">🌿 Ayurbot</h1>
        <div class="card p-4 text-center">
            <input type="text" id="query" class="form-control mb-3" placeholder="Ask Ayurbot about Ayurveda...">
            <button class="btn btn-custom w-100" onclick="handleSend()">Ask</button>
            <div id="response" class="response-box mt-3 d-none"></div>
        </div>
    </div>

    <script>
        function handleSend() {
            var query = document.getElementById('query').value.trim();
            var responseBox = document.getElementById('response');
            if (query !== "") {
                responseBox.innerHTML = `Searching Ayurveda knowledge for: ${query}`;
                responseBox.classList.remove('d-none');
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
